spring.application.name=dalbit_bootstrap
server.port=5000

# Jwt Configuration
jwt.secret-key=${JWT_SECRET_KEY}
jwt.access-token-expiration=360000
jwt.refresh-token-expiration=604800000

# External Firebase Configuration
firebase.account-path=firebase/dalbit-key.json

# External AWS Configuration
spring.cloud.aws.region.static=ap-northeast-2
spring.cloud.aws.sqs.enabled=false

# Persistence PostgreSQL Configuration
spring.datasource.url=${DB_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Persistence JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_batch_fetch_size=1000

# Persistence Redis Configuration
spring.data.redis.host=10.0.0.161
spring.data.redis.port=6379
spring.data.redis.password=${REDIS_PASSWORD}

# Storage Provider Configuration
storage.provider=r2

# Storage R2 Configuration
storage.r2.endpoint=https://563e74246bda9a2119498d1e3e0161fb.r2.cloudflarestorage.com
storage.r2.access-key=${R2_STORAGE_ACCESS_KEY}
storage.r2.secret-key=${R2_STORAGE_SECRET_KEY}
storage.r2.bucket-name=dalbit-r2-bucket
storage.r2.presigned-url-expiration-minutes=15

# Storage S3 Configuration
storage.s3.region=ap-northeast-2
storage.s3.bucket-name=dalbit-s3-bucket
storage.s3.presigned-url-expiration-minutes=15

# Messaging Provider Configuration
messaging.provider=rabbit_mq

# Messaging Rabbit MQ Configuration
spring.rabbitmq.host=10.0.0.204
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
spring.rabbitmq.virtual-host=/
spring.rabbitmq.template.retry.enabled=true
spring.rabbitmq.template.retry.initial-interval=1000ms
spring.rabbitmq.template.retry.max-attempts=3

# Messaging Rabbit MQ Route
rabbitmq.route.request-exchange=dalbit.ai.request
rabbitmq.route.response-exchange=dalbit.ai.response
rabbitmq.route.voice-training-request-routing-key=voice.training.request
rabbitmq.route.voice-training-response-routing-key=voice.training.complete
rabbitmq.route.audiobook-generation-request-routing-key=audiobook.generation.request
rabbitmq.route.audiobook-generation-response-routing-key=audiobook.generation.complete

# Messaging Rabbit MQ Queue
rabbitmq.queue.dlq=q.dalbit.dlq
rabbitmq.queue.exchange-dlx=dalbit.dlx
rabbitmq.queue.routing-key-error=error.routing.key
rabbitmq.queue.voice-training-request-queue=q.voice.training.request
rabbitmq.queue.voice-training-completion-queue=q.voice.training.complete?
rabbitmq.queue.audiobook-generation-request-queue=q.audiobook.generation.request
rabbitmq.queue.audiobook-generation-completion-queue=q.audiobook.generation.complete

# Monitoring Configuration
management.server.port=5001
management.metrics.tags.application=${spring.application.name}
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.endpoint.prometheus.access=read_only
